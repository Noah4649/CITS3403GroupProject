<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dashboard – FitTrack</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>

        <header class="topbar navbar">
            <span class="topbar-title navbar-brand">FitTrack</span>
            <span class="greeting ms-auto">Hi, <strong id="username-display"></strong></span>
        </header>

        <main class="main container-fluid py-4">

            <section class="card app-card workout-card mb-4">
                <div class="card-body">
                    <h2 class="section-title">Today's Training Sessions</h2>
                    <div class="workout-body" id="workout-content"></div>
                    <button class="btn btn-outline-secondary btn-sm btn-edit mt-3">Edit</button>
                </div>
            </section>

            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <section class="card app-card calories-card h-100">
                        <div class="card-body">
                            <h2 class="section-title">Net Calories Today</h2>
                            <ul class="cal-list list-unstyled" id="calorie-list"></ul>
                            <div class="cal-total d-flex justify-content-between mt-2">
                                <span>Total:</span>
                                <span class="cal-total-val fw-bold" id="cal-total-value"></span>
                            </div>
                            <div class="cal-targets mt-2" id="cal-targets">
                                <p><strong>Target (Maintenance): </strong></p>
                                <p><strong>Target (Cut): </strong></p>
                            </div>
                            <button class="btn btn-outline-secondary btn-sm btn-edit mt-3">Edit</button>
                        </div>
                    </section>
                </div>
                <div class="col-md-6" id="second-col-placeholder"></div>
            </div>

            <section class="card app-card profile-card">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col">
                            <h2 class="section-title">My Profile</h2>
                            <ul class="profile-stats list-unstyled" id="profile-stats"></ul>
                            <div class="profile-actions d-flex gap-2 mt-3">
                                <a href="profile.html" class="btn btn-primary btn-sm">View More</a>
                                <button class="btn btn-outline-primary btn-sm">Edit Goals</button>
                            </div>
                        </div>
                        <div class="col-auto">
                            <div class="avatar-placeholder" id="user-avatar" aria-label="Profile picture"></div>
                        </div>
                    </div>
                    <a href="feed.html" class="btn btn-friends w-100 mt-3">View Friends' Posts</a>
                </div>
            </section>

        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    </body>
</html>
