<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign Up – FitTrack</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>

        <div class="auth-wrapper">
            <div class="card auth-card shadow-sm">

                <div class="auth-brand">
                    <span class="brand-name">FitTrack</span>
                </div>

                <h1 class="auth-title">Sign Up</h1>

                <form id="signup-form" novalidate>

                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Choose a username" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Create a password" required>
                    </div>

                    <div class="mb-3">
                        <label for="retype-password" class="form-label">Retype Password</label>
                        <input type="password" class="form-control" id="retype-password" name="retype_password" placeholder="Confirm your password" required>
                    </div>

                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" id="show-password">
                        <label class="form-check-label" for="show-password">Show password</label>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 auth-submit-btn">Create Account</button>

                </form>

                <div class="auth-footer">
                    <a href="login.html" class="auth-link">Already have an account? Log in</a>
                </div>

            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            document.getElementById('show-password').addEventListener('change', function () {
                const type = this.checked ? 'text' : 'password';
                document.getElementById('password').type = type;
                document.getElementById('retype-password').type = type;
            });
        </script>

    </body>
</html>
