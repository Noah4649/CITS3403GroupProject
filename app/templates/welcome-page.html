<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - FitTrack</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

    <nav class="navbar topbar">
        <div class="container-fluid">
            <a class="navbar-brand topbar-title" href="{{ url_for('main.index') }}">FitTrack</a>
        </div>
    </nav>

    <main class="main welcome">
        <div class="container d-flex justify-content-center align-items-center">
            <div class="card app-card text-center welcome-card">
                <div class="card-body">
                    <h1 class="section-title welcome-heading">Welcome to FitTrack</h1>
                    <p class="welcome-subtext">Your fitness journey starts with you.</p>
                    <p class="welcome-description">
                        Track your workouts, monitor your progress, and stay connected
                        with your fitness community — all in one place.
                    </p>

                    <div class="d-flex justify-content-center gap-3 flex-wrap">
                        <a href="{{ url_for('main.login') }}" class="btn btn-primary">Login</a>
                        <a href="{{ url_for('main.signup') }}" class="btn btn-outline-primary">Sign Up</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
