<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- PAGE SETUP -->
        <!-- Basic page setup, Bootstrap, Google fonts, and our custom CSS -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Reset Password – FitTrack</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    </head>

    <body>

        <!-- AUTH PAGE WRAPPER -->
        <!-- Centers the password reset card on the page -->
        <div class="auth-wrapper">
            <div class="card auth-card shadow-sm">

                <!-- BRAND LOGO -->
                <!-- Shows the FitTrack brand name at the top of the card -->
                <div class="auth-brand">
                    <span class="brand-name">FitTrack</span>
                </div>

                <!-- PASSWORD RESET TITLE -->
                <!-- Explains to the user that this page is for starting a password reset -->
                <h1 class="auth-title">Reset Password</h1>
                <p class="auth-subtitle">Enter your registered email to continue.</p>

                <!-- FLASH MESSAGES -->
                <!-- Displays error or success messages sent from routes.py using flash() -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <!-- PASSWORD RESET EMAIL FORM -->
                <!-- This form sends the user's email to the /password-reset route using POST -->
                <form id="reset-form" method="POST" action="{{ url_for('main.password_reset') }}" novalidate>

                    <!-- EMAIL INPUT -->
                    <!-- User enters the email linked to their account -->
                    <div class="mb-4">
                        <label for="email" class="form-label">Email</label>
                        <input 
                            type="email" 
                            class="form-control" 
                            id="email" 
                            name="email" 
                            placeholder="Enter your email" 
                            required
                        >
                    </div>

                    <!-- CONTINUE BUTTON -->
                    <!-- Submits the email so routes.py can check if the account exists -->
                    <button type="submit" class="btn btn-primary w-100 auth-submit-btn">
                        Continue
                    </button>

                </form>

                <!-- BACK TO LOGIN LINK -->
                <!-- Lets the user return to the login page if they remember their password -->
                <div class="auth-footer">
                    <a href="{{ url_for('main.login') }}" class="auth-link">Back to login</a>
                </div>

            </div>
        </div>

        <!-- BOOTSTRAP SCRIPT -->
        <!-- Loads Bootstrap JavaScript components -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    </body>
</html>
