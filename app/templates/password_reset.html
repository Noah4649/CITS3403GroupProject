<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Password Reset – FitTrack</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    </head>
    <body>

        <div class="auth-wrapper">
            <div class="card auth-card shadow-sm">

                <div class="auth-brand">
                    <span class="brand-name">FitTrack</span>
                </div>

                <h1 class="auth-title">Reset Password</h1>
                <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>

                <form id="reset-form" novalidate>

                    <div class="mb-4">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
                        <div class="invalid-feedback"></div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 auth-submit-btn">Send Reset Link</button>

                </form>

                <div class="auth-footer">
                    <a href="{{ url_for('main.login') }}" class="auth-link">Back to login</a>
                </div>

            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="{{ url_for('static', filename='js/password_reset.js') }}"></script>

    </body>
</html>
